# 9800 검증(dev) 스택 오버라이드 — 운영(9900) 스택과 같은 서버에서 동시 구동하기 위한 차분.
# 포트는 .env.dev의 APP_PORT=9800으로 주입되므로 이 파일은 브리지 서브넷 충돌만 회피한다
# (운영 스택이 172.36.0.0/16을 점유 — 같은 대역으로 두 번째 네트워크를 만들 수 없음).
#
# ⚠️ 사내 71번 서버의 compose는 두 파일의 ipam.config를 교체가 아니라 누적 병합해서
# 이 오버라이드가 무력화된다("Pool overlaps with other one") — 그 경우 이 파일을 쓰지 말고
# dev 클론의 docker-compose.yml 서브넷을 직접 아래 값(172.42)으로 수정한 뒤
#   alias dcdev='docker compose -p bpm-dev --env-file .env.dev'
# 로 실행한다. 절차·검증값: docs/db-migration-9800.md §2.
#
# 병합이 정상인 환경에서의 실행:
#   docker compose -p bpm-dev -f docker-compose.yml -f docker-compose.dev.yml --env-file .env.dev up -d --build
networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.42.0.0/16   # 2026-07-06 서버 검증값 — 172.37~40은 병합 누적으로 실패했던 이력
          gateway: 172.42.0.1
